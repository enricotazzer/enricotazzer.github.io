---
layout: default
title: Articles
---
<!-- Page Header -->
<header class="masthead" style="background-image: url('/assets/img/artificial-intelligence-background_798031-139.jpg.avif')">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="site-heading">
                    <h1>Articles</h1>
                </div>
            </div>
        </div>
    </div>
</header>
<!-- Main Content -->
<div class="container px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-md-10 col-lg-8 col-xl-7">
            {% for post in site.posts %}
            <div class="post-preview">
                <a href="{{ post.url }}">
                    <h2 class="post-title">{{ post.title }}</h2>
                    {% if post.subtitle %}<h3 class="post-subtitle">{{ post.subtitle }}</h3>{% endif %}
                </a>
                <p class="post-meta">
                    Posted by
                    <a href="/about.html">{{ site.author }}</a>
                    on {{ post.date | date: "%d %B %Y" }}
                </p>
            </div>
            {% unless forloop.last %}<hr class="my-4" />{% endunless %}
            {% endfor %}
        </div>
    </div>
</div>
